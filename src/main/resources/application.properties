# DataSource - supports both Railway (PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD)
# and Render (DB_HOST/DB_PORT/DB_NAME/DB_USERNAME/DB_PASSWORD) env var naming conventions
spring.datasource.url=jdbc:postgresql://${PGHOST:${DB_HOST:localhost}}:${PGPORT:${DB_PORT:5432}}/${PGDATABASE:${DB_NAME:newlynest}}
spring.datasource.username=${PGUSER:${DB_USERNAME:newlynest}}
spring.datasource.password=${PGPASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server
server.port=${PORT:8080}

# Spring Security
spring.security.user.name=admin
spring.security.user.password=ignored
