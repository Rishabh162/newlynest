<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="google-site-verification" content="21nKQ9o9NDmpBmD5UAjegveyw0j6nSlb0L85jZrnVek"/>
    <title layout:title-pattern="$CONTENT_TITLE - NewlyNest">NewlyNest</title>

    <!-- SEO: Meta Description & Keywords -->
    <meta name="description" th:content="${metaDescription} ?: 'NewlyNest connects newly married couples with experienced ones for real conversations about marriage. Get peer support from couples who have been there.'"/>
    <meta name="keywords" content="marriage advice, newly married couples, peer support, couple mentorship, newlywed help, first year marriage, relationship support"/>
    <meta name="author" content="NewlyNest"/>
    <link rel="canonical" th:href="${canonicalUrl} ?: 'https://newlynest-production.up.railway.app/'"/>

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn previews) -->
    <meta property="og:type" content="website"/>
    <meta property="og:site_name" content="NewlyNest"/>
    <meta property="og:title" th:content="${metaTitle} ?: 'NewlyNest — Peer Support for Newly Married Couples'"/>
    <meta property="og:description" th:content="${metaDescription} ?: 'Connect with experienced couples who get it. Real conversations, real support for your first years of marriage.'"/>
    <meta property="og:url" th:content="${canonicalUrl} ?: 'https://newlynest-production.up.railway.app/'"/>
    <meta property="og:image" content="https://newlynest-production.up.railway.app/images/og-image.png"/>
    <meta property="og:image:width" content="1200"/>
    <meta property="og:image:height" content="630"/>

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" th:content="${metaTitle} ?: 'NewlyNest — Peer Support for Newly Married Couples'"/>
    <meta name="twitter:description" th:content="${metaDescription} ?: 'Connect with experienced couples who get it. Real support for newly married couples.'"/>
    <meta name="twitter:image" content="https://newlynest-production.up.railway.app/images/og-image.png"/>

    <script>
        tailwind = { config: {
            theme: { extend: {
                colors: {
                    'soft-rose':  '#F7C8C8',
                    'sage-green': '#A8C3A0',
                    'warm-beige': '#F4EFEA',
                    'deep-plum':  '#5A3E5B',
                    'soft-gold':  '#D6B77A'
                },
                fontFamily: {
                    heading: ['"Playfair Display"', 'serif'],
                    body:    ['Lato', 'sans-serif']
                }
            }}
        }}
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=Lato:wght@300;400;700&amp;display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/custom.css}"/>
</head>
<body class="bg-warm-beige font-body min-h-screen flex flex-col">

<!-- Navigation -->
<nav class="bg-deep-plum shadow-md">
    <div class="max-w-6xl mx-auto px-4" style="height:4rem;display:flex;align-items:center;justify-content:space-between;">

        <a th:href="@{/}" class="font-heading text-2xl font-bold text-soft-gold tracking-wide">
            NewlyNest
        </a>

        <div style="display:flex;align-items:center;gap:1.5rem;">

            <!-- Logged-in links -->
            <th:block th:if="${isAuthenticated}">
                <a th:href="@{/dashboard}"
                   class="text-white text-sm font-medium" style="text-decoration:none;">
                    Dashboard
                </a>
                <a th:href="@{/accounts/profile-setup}"
                   class="text-white text-sm font-medium" style="text-decoration:none;">
                    My Profile
                </a>
                <form th:action="@{/accounts/logout}" method="post" style="margin:0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="text-white text-sm font-medium"
                            style="background:none;border:none;cursor:pointer;padding:0;">
                        Log out
                    </button>
                </form>
            </th:block>

            <!-- Guest links -->
            <th:block th:if="${!isAuthenticated}">
                <a th:href="@{/accounts/login}"
                   class="text-white text-sm font-medium" style="text-decoration:none;">
                    Log in
                </a>
                <a th:href="@{/accounts/signup}"
                   style="background:#D6B77A;color:#5A3E5B;padding:0.5rem 1.25rem;border-radius:9999px;font-size:0.875rem;font-weight:600;text-decoration:none;">
                    Sign Up
                </a>
            </th:block>

        </div>
    </div>
</nav>

<!-- Flash messages -->
<div class="max-w-6xl mx-auto px-4 mt-4 w-full">
    <div th:if="${successMessage}"
         style="background:#f0fdf4;border:1px solid #86efac;color:#166534;border-radius:0.5rem;padding:0.75rem 1rem;font-size:0.875rem;margin-bottom:0.5rem;">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}"
         style="background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;border-radius:0.5rem;padding:0.75rem 1rem;font-size:0.875rem;margin-bottom:0.5rem;">
        <span th:text="${errorMessage}"></span>
    </div>
</div>

<!-- Page content injected here -->
<main class="flex-grow">
    <th:block layout:fragment="content">
        <!-- replaced by content templates -->
    </th:block>
</main>

<!-- Footer -->
<footer style="background:#5A3E5B;color:white;margin-top:auto;">
    <div class="max-w-6xl mx-auto px-4 py-8 text-center">
        <p class="font-heading text-xl font-bold text-soft-gold mb-2">NewlyNest</p>
        <p style="color:#d1d5db;font-size:0.875rem;">Because every marriage is a journey worth sharing.</p>
        <p style="color:#9ca3af;font-size:0.75rem;margin-top:1rem;">&copy; 2025 NewlyNest. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
