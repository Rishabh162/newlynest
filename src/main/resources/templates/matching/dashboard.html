<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Dashboard</title></head>
<body>
<th:block layout:fragment="content">

    <div class="max-w-6xl mx-auto py-10 px-4">

        <div class="mb-8">
            <h1 class="font-heading text-4xl font-bold text-deep-plum">Find Your Mentors</h1>
            <p class="text-gray-500 mt-2">Browse experienced couples who are ready to connect with you</p>
        </div>

        <!-- Empty state -->
        <div th:if="${couples == null or couples.isEmpty()}"
             class="text-center py-20 bg-white rounded-2xl shadow-sm">
            <p class="text-5xl mb-4">:)</p>
            <h3 class="font-heading text-2xl font-semibold text-deep-plum mb-2">No couples available yet</h3>
            <p class="text-gray-500">Check back soon — more experienced couples are joining every week.</p>
        </div>

        <!-- Couple cards grid -->
        <div th:if="${couples != null and !couples.isEmpty()}"
             class="grid grid-cols-1 gap-6" style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));">

            <div th:each="profile : ${couples}"
                 class="bg-white rounded-2xl shadow-sm overflow-hidden flex flex-col">

                <!-- Card header -->
                <div class="bg-deep-plum p-6 flex items-center" style="gap:1rem;">
                    <div class="bg-yellow-300 rounded-full flex items-center justify-center flex-shrink-0"
                         style="width:3.5rem;height:3.5rem;">
                        <span class="font-heading text-deep-plum font-bold text-lg"
                              th:text="${profile.initials}">AB</span>
                    </div>
                    <div>
                        <h3 class="font-heading text-white font-semibold text-lg"
                            th:text="${profile.displayName}">Name</h3>
                        <p class="text-purple-200 text-sm"
                           th:text="|${profile.yearsMarried} years of marriage|">0 years</p>
                    </div>
                </div>

                <!-- Card body -->
                <div class="p-5 flex flex-col flex-grow">
                    <p class="text-gray-600 text-sm leading-relaxed mb-4"
                       th:text="${profile.bio}">Bio here.</p>

                    <!-- Strength tags -->
                    <div class="flex flex-wrap mb-4" style="gap:0.5rem;">
                        <span th:each="tag : ${profile.strengthTags}"
                              th:text="${tag}"
                              class="bg-green-100 text-green-800 text-xs px-3 py-1 rounded-full font-medium">tag</span>
                    </div>

                    <div class="mt-auto">
                        <a th:href="@{/couple/{id}(id=${profile.id})}"
                           class="block w-full text-center bg-deep-plum text-white py-2 rounded-lg text-sm font-semibold">
                            View Profile and Book
                        </a>
                    </div>
                </div>

            </div>
        </div>

    </div>

</th:block>
</body>
</html>
