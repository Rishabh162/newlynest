<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Booking Confirmed</title></head>
<body>
<th:block layout:fragment="content">

    <div class="min-h-screen flex items-center justify-center py-16 px-4">
        <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md text-center">

            <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 bg-green-100">
                <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>

            <h1 class="font-heading text-3xl font-bold text-deep-plum mb-3">Booking Requested!</h1>
            <p class="text-gray-500 leading-relaxed mb-8">
                Your request has been sent. The couple will review it and get back to you shortly.
            </p>

            <div class="bg-yellow-50 rounded-xl p-4 mb-8 text-sm text-gray-600">
                <p>While you wait, think about what you would like to discuss so you can make the most of your conversation.</p>
            </div>

            <div class="flex flex-col gap-3">
                <a th:href="@{/dashboard}"
                   class="w-full bg-deep-plum text-white py-3 rounded-lg font-semibold text-sm text-center block">
                    Back to Dashboard
                </a>
                <a th:href="@{/}"
                   class="w-full border-2 border-deep-plum text-deep-plum py-3 rounded-lg font-semibold text-sm text-center block">
                    Go to Home
                </a>
            </div>

        </div>
    </div>

</th:block>
</body>
</html>
