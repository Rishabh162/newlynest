<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Log In</title></head>
<body>
<th:block layout:fragment="content">
    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
            <div class="text-center mb-8">
                <h2 class="font-heading text-3xl font-bold text-deep-plum">Welcome back</h2>
                <p class="text-gray-500 mt-2 text-sm">Log in to your NewlyNest account</p>
            </div>

            <div th:if="${errorMessage}"
                 class="bg-red-50 border border-red-300 text-red-700 rounded-lg px-4 py-3 text-sm mb-4"
                 th:text="${errorMessage}">Error</div>

            <form th:action="@{/accounts/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" name="username" placeholder="your_username" autofocus
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"/>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" placeholder="Password"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"/>
                </div>

                <button type="submit"
                        class="w-full bg-deep-plum text-white py-3 rounded-lg font-semibold text-sm">
                    Log In
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                Don't have an account?
                <a th:href="@{/accounts/signup}" class="text-deep-plum font-semibold">Sign up</a>
            </p>
        </div>
    </div>
</th:block>
</body>
</html>
