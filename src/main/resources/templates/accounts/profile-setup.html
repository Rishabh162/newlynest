<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Profile Setup</title></head>
<body>
<th:block layout:fragment="content">
    <div class="max-w-2xl mx-auto py-12 px-4">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <div class="mb-8">
                <h2 class="font-heading text-3xl font-bold text-deep-plum"
                    th:text="${isEdit} ? 'Update Your Profile' : 'Set Up Your Profile'">Setup</h2>
                <p class="text-gray-500 mt-2">Tell us about you and your partner</p>
            </div>

            <form th:action="@{/accounts/profile-setup}" th:object="${coupleProfileForm}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Role selection -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">We are a...</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" th:field="*{role}" value="NEW" class="sr-only peer"/>
                            <div class="border-2 border-gray-200 rounded-xl p-4 text-center peer-checked:border-deep-plum peer-checked:bg-purple-50">
                                <p class="text-2xl mb-2">New</p>
                                <p class="font-semibold text-deep-plum text-sm">Newly Married Couple</p>
                                <p class="text-gray-400 text-xs mt-1">Looking for guidance</p>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" th:field="*{role}" value="EXPERIENCED" class="sr-only peer"/>
                            <div class="border-2 border-gray-200 rounded-xl p-4 text-center peer-checked:border-deep-plum peer-checked:bg-purple-50">
                                <p class="text-2xl mb-2">Exp</p>
                                <p class="font-semibold text-deep-plum text-sm">Experienced Couple</p>
                                <p class="text-gray-400 text-xs mt-1">Ready to share wisdom</p>
                            </div>
                        </label>
                    </div>
                    <p th:if="${#fields.hasErrors('role')}" th:errors="*{role}"
                       class="text-red-500 text-xs mt-2">Error</p>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Partner's Full Name</label>
                    <input type="text" th:field="*{partnerName}" placeholder="e.g. Raj Kumar"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"/>
                    <p th:if="${#fields.hasErrors('partnerName')}" th:errors="*{partnerName}"
                       class="text-red-500 text-xs mt-1">Error</p>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Years Married</label>
                    <input type="number" th:field="*{yearsMarried}" min="0" max="75" placeholder="e.g. 3"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"/>
                    <p th:if="${#fields.hasErrors('yearsMarried')}" th:errors="*{yearsMarried}"
                       class="text-red-500 text-xs mt-1">Error</p>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Story</label>
                    <textarea th:field="*{bio}" rows="4"
                              placeholder="Tell other couples a bit about your journey together..."
                              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm resize-none"></textarea>
                    <p th:if="${#fields.hasErrors('bio')}" th:errors="*{bio}"
                       class="text-red-500 text-xs mt-1">Error</p>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Areas of Strength <span class="text-gray-400 font-normal">(comma-separated)</span>
                    </label>
                    <input type="text" th:field="*{areasOfStrength}"
                           placeholder="e.g. communication, finances, parenting"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"/>
                </div>

                <button type="submit"
                        class="w-full bg-deep-plum text-white py-3 rounded-lg font-semibold text-sm"
                        th:text="${isEdit} ? 'Save Changes' : 'Complete Profile'">Submit</button>
            </form>
        </div>
    </div>
</th:block>
</body>
</html>
