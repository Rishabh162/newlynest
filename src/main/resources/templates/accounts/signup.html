<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Sign Up</title></head>
<body>
<th:block layout:fragment="content">
    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
            <div class="text-center mb-8">
                <h2 class="font-heading text-3xl font-bold text-deep-plum">Create your account</h2>
                <p class="text-gray-500 mt-2 text-sm">Join NewlyNest - it is free</p>
            </div>

            <form th:action="@{/accounts/signup}" th:object="${signUpForm}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                        <input type="text" th:field="*{firstName}" placeholder="Anita"
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"/>
                        <p th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"
                           class="text-red-500 text-xs mt-1">Error</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                        <input type="text" th:field="*{lastName}" placeholder="Kumar"
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"/>
                        <p th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"
                           class="text-red-500 text-xs mt-1">Error</p>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" th:field="*{email}" placeholder="anita@example.com"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"/>
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                       class="text-red-500 text-xs mt-1">Error</p>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" th:field="*{username}" placeholder="anita_kumar"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"/>
                    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}"
                       class="text-red-500 text-xs mt-1">Error</p>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" th:field="*{password}" placeholder="At least 8 characters"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"/>
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                       class="text-red-500 text-xs mt-1">Error</p>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                    <input type="password" th:field="*{confirmPassword}" placeholder="Repeat password"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"/>
                    <p th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"
                       class="text-red-500 text-xs mt-1">Error</p>
                </div>

                <button type="submit"
                        class="w-full bg-deep-plum text-white py-3 rounded-lg font-semibold text-sm">
                    Create Account
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                Already have an account?
                <a th:href="@{/accounts/login}" class="text-deep-plum font-semibold">Log in</a>
            </p>
        </div>
    </div>
</th:block>
</body>
</html>
