<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Join NewlyNest Free — Connect with Experienced Couples</title></head>
<body>
<th:block layout:fragment="content">

    <!-- Decorative blobs -->
    <div class="auth-blob"></div>
    <div class="auth-blob-2"></div>

    <div class="hero-gradient" style="min-height:calc(100vh - 4rem);display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;position:relative;">

        <div style="background:white;border-radius:1.5rem;box-shadow:0 8px 32px rgba(90,62,91,0.12);
                    padding:2.5rem 2rem;width:100%;max-width:30rem;position:relative;z-index:1;">

            <!-- Header -->
            <div style="text-align:center;margin-bottom:2rem;">
                <p style="font-size:2.25rem;margin-bottom:0.75rem;">🌸</p>
                <h1 class="font-heading font-bold text-deep-plum" style="font-size:1.75rem;margin-bottom:0.4rem;">
                    Create your account
                </h1>
                <p style="color:#6b7280;font-size:0.9rem;">Join a community of couples supporting each other</p>
            </div>

            <form th:action="@{/accounts/signup}" th:object="${signUpForm}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.875rem;margin-bottom:1rem;">
                    <div>
                        <label style="display:block;font-size:0.875rem;font-weight:500;color:#374151;margin-bottom:0.4rem;">First Name</label>
                        <input type="text" th:field="*{firstName}" placeholder="Anita" class="input-soft"/>
                        <p th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"
                           style="color:#ef4444;font-size:0.75rem;margin-top:0.3rem;">Error</p>
                    </div>
                    <div>
                        <label style="display:block;font-size:0.875rem;font-weight:500;color:#374151;margin-bottom:0.4rem;">Last Name</label>
                        <input type="text" th:field="*{lastName}" placeholder="Kumar" class="input-soft"/>
                        <p th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"
                           style="color:#ef4444;font-size:0.75rem;margin-top:0.3rem;">Error</p>
                    </div>
                </div>

                <div style="margin-bottom:1rem;">
                    <label style="display:block;font-size:0.875rem;font-weight:500;color:#374151;margin-bottom:0.4rem;">Email</label>
                    <input type="email" th:field="*{email}" placeholder="anita@example.com" class="input-soft"/>
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                       style="color:#ef4444;font-size:0.75rem;margin-top:0.3rem;">Error</p>
                </div>

                <div style="margin-bottom:1rem;">
                    <label style="display:block;font-size:0.875rem;font-weight:500;color:#374151;margin-bottom:0.4rem;">Username</label>
                    <input type="text" th:field="*{username}" placeholder="anita_kumar" class="input-soft"/>
                    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}"
                       style="color:#ef4444;font-size:0.75rem;margin-top:0.3rem;">Error</p>
                </div>

                <div style="margin-bottom:1rem;">
                    <label style="display:block;font-size:0.875rem;font-weight:500;color:#374151;margin-bottom:0.4rem;">Password</label>
                    <input type="password" th:field="*{password}" placeholder="At least 8 characters" class="input-soft"/>
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                       style="color:#ef4444;font-size:0.75rem;margin-top:0.3rem;">Error</p>
                </div>

                <div style="margin-bottom:1.75rem;">
                    <label style="display:block;font-size:0.875rem;font-weight:500;color:#374151;margin-bottom:0.4rem;">Confirm Password</label>
                    <input type="password" th:field="*{confirmPassword}" placeholder="Repeat password" class="input-soft"/>
                    <p th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"
                       style="color:#ef4444;font-size:0.75rem;margin-top:0.3rem;">Error</p>
                </div>

                <button type="submit" class="btn-submit">Create Account — It's Free</button>
            </form>

            <p style="text-align:center;font-size:0.875rem;color:#6b7280;margin-top:1.5rem;">
                Already have an account?
                <a th:href="@{/accounts/login}" class="text-deep-plum font-semibold" style="text-decoration:none;">Log in</a>
            </p>

        </div>
    </div>

</th:block>
</body>
</html>
